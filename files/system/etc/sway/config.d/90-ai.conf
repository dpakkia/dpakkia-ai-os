# AI Spotlight launcher
set $ai_launcher /usr/local/bin/ai-launcher

bindsym $mod+space exec $ai_launcher

# Terminale
set $term foot
bindsym $mod+Return exec foot

# Browser
bindsym $mod+b exec firefox

# Screenshot area
bindsym $mod+Shift+s exec grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
