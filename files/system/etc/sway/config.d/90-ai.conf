# AI Spotlight launcher
# Remove only existing default bindings before overriding them

unbindsym Mod4+space
unbindsym Mod4+Return
unbindsym Mod4+b

bindsym Mod4+space exec /usr/bin/ai-launcher
bindsym Mod4+Return exec foot
bindsym Mod4+b exec firefox
bindsym Mod4+Shift+s exec sh -lc 'mkdir -p "$HOME/Pictures"; grim -g "$(slurp)" "$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"'
