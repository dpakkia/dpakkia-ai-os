# dpakkia-ai-os bindings

# Remove existing Wayblue/Sway bindings before overriding them
unbindsym Mod4+space
unbindsym Mod4+Return
unbindsym Mod4+b

# AI launcher
bindsym Mod4+space exec /usr/bin/ai-launcher

# Apps
bindsym Mod4+Return exec foot
bindsym Mod4+b exec firefox

# Screenshots
bindsym Mod4+Shift+s exec /usr/bin/ai-screenshot area
bindsym Mod4+Print exec /usr/bin/ai-screenshot full
bindsym Print exec /usr/bin/ai-screenshot area

# Notifications
exec_always sh -lc 'pkill -x mako 2>/dev/null || true; mako >/tmp/mako.log 2>&1 &'

# Clean Waybar
exec_always sh -lc 'pkill -x waybar 2>/dev/null || true; waybar >/tmp/waybar.log 2>&1 &'
